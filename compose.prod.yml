services:
  db:
    container_name: lootopia-db
    image: postgres:17-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ./docker.prod/postgres:/var/lib/postgresql/data
    networks:
      - app-network

  nginx:
    container_name: lootopia-proxy
    build:
      context: ./nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    environment:
      - DASHBOARD_DOMAIN=${DASHBOARD_DOMAIN}
      - MOBILE_DOMAIN=${MOBILE_DOMAIN}
    depends_on:
      - dashboard
      - mobile
      - api
    networks:
      - app-network

  dashboard:
    container_name: lootopia-dashboard
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    networks:
      - app-network

  mobile:
    container_name: lootopia-mobile
    build:
      context: .
      dockerfile: packages/mobile/Dockerfile
    networks:
      - app-network

  api:
    container_name: lootopia-api
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    env_file: .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
