services:
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ./docker/postgres:/var/lib/postgresql/data

  fix-permissions-rustfs:
    image: alpine
    container_name: fix-permissions-rustfs
    command: >
      sh -c "
        chown -R 10001:10001 /data &&
        chown -R 10001:10001 /logs &&
        chown -R 10001:10001 /conf
      "
    volumes:
      - ./docker/rustfs/data:/data
      - ./docker/rustfs/logs:/logs
      - ./docker/rustfs/conf:/conf
    restart: "no"

  bucket:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    user: "10001:10001"
    depends_on:
      fix-permissions-rustfs:
        condition: service_completed_successfully
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=${S3_USER}
      - RUSTFS_SECRET_KEY=${S3_PASSWORD}
    volumes:
      - ./docker/rustfs/data:/data
      - ./docker/rustfs/logs:/logs
      - ./docker/rustfs/conf:/etc/rustfs
